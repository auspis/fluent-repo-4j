name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Java 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Cache Maven dependencies
      uses: actions/cache@v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    # Check code formatting and run all tests: unit + H2 integration + E2E (as per README)
    - name: Check code formatting and run all tests
      run: ./mvnw spotless:check verify

    # SonarCloud analysis
    - name: SonarCloud Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_QUBE }}
      run: ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
